# ═══════════════════════════════════════════════════════════════════════════
# CD — hangman-front  (build & push a GitHub Container Registry)
# ═══════════════════════════════════════════════════════════════════════════

name: CD - hangman-front

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag adicional para la imagen (opcional, ej: v1.0.0)'
        required: false
        type: string
        default: ''

# Permisos:
#   contents: read    → para hacer checkout del código
#   packages: write   → para hacer push al Container Registry de GitHub (ghcr.io)
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # `github.repository_owner` es tu usuario u organización. GHCR exige el
  # nombre de imagen en minúsculas; si tu usuario tiene mayúsculas (p.ej.
  # "JaimeNadal"), no pasa nada: docker/metadata-action normaliza el nombre
  # de la imagen a minúsculas automáticamente al generar los tags.
  IMAGE_NAME: ${{ github.repository_owner }}/hangman-front

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx habilita features avanzadas: multi-arch, cache remoto, BuildKit
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN se genera automáticamente en cada run. No hace falta
          # configurar un PAT (Personal Access Token) si los permissions son
          # correctos arriba (packages: write).
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genera el conjunto de tags y labels OCI estándar para la imagen.
      # Es la pieza menos visible pero más útil: produce metadatos consistentes
      # (org.opencontainers.image.source, .revision, etc.) que luego usan
      # los scanners y los registries para mostrar info del build.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./hangman-front
          file:    ./hangman-front/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # Cache de capas Docker en el almacenamiento de GitHub Actions.
          # `mode=max` cachea TODAS las capas intermedias, no solo la final.
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Imagen publicada
        run: |
          echo "### Imagen publicada" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
