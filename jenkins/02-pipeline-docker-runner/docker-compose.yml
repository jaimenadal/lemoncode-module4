# ═══════════════════════════════════════════════════════════════════════════
# docker-compose.yml — levantar el host Jenkins del Ejercicio 2
# ═══════════════════════════════════════════════════════════════════════════

version: "3.8"

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins2
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    
    group_add:
      - "${DOCKER_GID}"

volumes:
  jenkins_home:
