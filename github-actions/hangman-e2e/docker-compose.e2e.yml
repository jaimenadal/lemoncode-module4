# ═══════════════════════════════════════════════════════════════════════════
# docker-compose.e2e.yml — Stack para tests E2E
# ═══════════════════════════════════════════════════════════════════════════
services:

  api:
    image: hangman-api:e2e
    container_name: hangman-api
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  front:
    image: hangman-front:e2e
    container_name: hangman-front
    ports:
      - "8080:8080"
    environment:
     API_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

networks:
  default:
    name: hangman-e2e
